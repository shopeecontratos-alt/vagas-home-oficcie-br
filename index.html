<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabalho Remoto</title>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.hero{background:linear-gradient(135deg,#ff6a00,#ff8c42);padding:40px;text-align:center}
.container{max-width:500px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:10px;margin-top:15px}
button{width:100%;padding:15px;margin-top:10px;border:none;border-radius:8px;background:#ff6a00;color:#fff;font-weight:bold}
.btn-dark{background:#1f2937}
</style>
</head>

<body>

<div class="hero">
<h1>Trabalhe de casa</h1>
<p>Responda e libere sua vaga</p>
</div>

<div class="container">

<div id="q1" class="card">
<p>Você tem internet?</p>
<button onclick="next(1)">Sim</button>
<button class="btn-dark" onclick="next(1)">Não</button>
</div>

<div id="q2" class="card" style="display:none;">
<p>Consegue responder mensagens?</p>
<button onclick="next(2)">Sim</button>
<button class="btn-dark" onclick="next(2)">Não</button>
</div>

<div id="q3" class="card" style="display:none;">
<p>Quer trabalhar online?</p>
<button onclick="finish()">Sim</button>
<button class="btn-dark" onclick="finish()">Não</button>
</div>

<div id="loading" class="card" style="display:none;text-align:center;">
<p>Analisando...</p>
</div>

<div id="final" class="card" style="display:none;text-align:center;">
<h2>🎉 Você foi aprovado!</h2>
<p>Finalize o pagamento</p>

<h3>R$ 9,90</h3>

<button onclick="showPix()">Pagar com PIX</button>

<div id="pix" style="display:none;margin-top:15px;">
<p>Copie o PIX:</p>

<input id="pixKey" value="SUA_CHAVE_PIX_AQUI" style="width:100%;padding:10px">

<button onclick="copyPix()">Copiar</button>
</div>

</div>

</div>

<script>

function next(n){
document.getElementById("q"+n).style.display="none";
document.getElementById("q"+(n+1)).style.display="block";
}

function finish(){
document.getElementById("q3").style.display="none";
document.getElementById("loading").style.display="block";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("final").style.display="block";
},1500);
}

function showPix(){
document.getElementById("pix").style.display="block";
}

function copyPix(){
let text = document.getElementById("pixKey").value;

navigator.clipboard.writeText(text)
.then(()=>alert("PIX copiado!"))
.catch(()=>alert("Erro ao copiar"));
}

</script>

</body>
</html>
