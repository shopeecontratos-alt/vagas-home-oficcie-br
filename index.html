<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Processo Seletivo</title>

<style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;margin:0}
.container{max-width:480px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:12px;margin-top:15px}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;background:#ff6a00;color:#fff}
input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none}
</style>
</head>

<body>

<div class="container">

<!-- CAPTURA LEAD -->
<div id="lead" class="card">
<h2>Antes de começar</h2>
<p>Informe seus dados para continuar:</p>

<input id="nome" placeholder="Seu nome">
<input id="contato" placeholder="WhatsApp ou Email">

<button onclick="salvarLead()">Continuar</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card" style="display:none;">
<h2 id="saudacao"></h2>
<p>Você tem acesso à internet?</p>

<button onclick="responder('sim')">Sim</button>
<button onclick="responder('nao')">Não</button>
</div>

<!-- RESULTADO -->
<div id="final" class="card" style="display:none;">
<h2 id="msgFinal"></h2>

<p id="perfil"></p>

<button onclick="whats()">Continuar pelo WhatsApp</button>
</div>

</div>

<script>

let respostas=[];

function salvarLead(){
  let nome=document.getElementById("nome").value;
  let contato=document.getElementById("contato").value;

  if(!nome || !contato){
    alert("Preencha os campos");
    return;
  }

  localStorage.setItem("nome",nome);
  localStorage.setItem("contato",contato);

  document.getElementById("lead").style.display="none";
  document.getElementById("quiz").style.display="block";

  document.getElementById("saudacao").innerText="Olá, "+nome;
}

function responder(resp){
  respostas.push(resp);

  if(respostas.length>=2){
    mostrarResultado();
  }
}

function mostrarResultado(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("final").style.display="block";

  let nome=localStorage.getItem("nome");

  document.getElementById("msgFinal").innerText=
  nome+", seu perfil foi analisado";

  document.getElementById("perfil").innerText=
  "Você demonstrou interesse e isso é positivo para iniciar.";
}

function whats(){
  let nome=localStorage.getItem("nome");
  let contato=localStorage.getItem("contato");

  let msg="Olá, sou "+nome+" e finalizei o processo.";

  window.open("https://wa.me/5599999999999?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
